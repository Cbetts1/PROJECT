# mirror/mount-points.conf
# OverlayFS mirror configuration for AIOS hosted mode.
#
# Format: <host_path> <mount_point_label> [ro|rw]
#
# ro  = bind mount (read-only view of host path)
# rw  = full OverlayFS (reads from host, writes go to AIOS upper layer)
#
# Adjust paths to match your device layout.

# ── Read-only views of host system paths ─────────────────────────────────────
/usr                   usr                ro
/system                system             ro
/vendor                vendor             ro

# ── Android Termux prefix (read-only) ────────────────────────────────────────
/data/data/com.termux/files/usr    termux_usr    ro

# ── User storage (read-write — changes go to AIOS upper layer) ────────────────
/sdcard                sdcard             rw
/data/media/0          media              rw

# ── Proc/sys virtual filesystems (bind, read-only) ────────────────────────────
/proc                  proc               ro
/sys                   sys                ro
/dev                   dev                ro
