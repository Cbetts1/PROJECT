set default=0
set timeout=5

menuentry "AIOSCPU - OS-AI (AURA interface)" {
    linux   /boot/vmlinuz root=/dev/sda1 rw quiet aioscpu_mode=ai
    initrd  /boot/initrd.img
}

menuentry "AIOSCPU - OS-SHELL (standard shell)" {
    linux   /boot/vmlinuz root=/dev/sda1 rw quiet aioscpu_mode=shell
    initrd  /boot/initrd.img
}
