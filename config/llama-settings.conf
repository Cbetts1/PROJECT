# config/llama-settings.conf
# Llama model parameters for AIOS.
# Sourced by ai/shell-interface/ai-ask.sh and ai/inference-engine/start-daemon.sh

# ── Model path ────────────────────────────────────────────────────────────────
# Set automatically by ai/model-quantizer/download-model.sh
# Override manually if you place your model elsewhere.
MODEL_PATH=llama_model/model.Q4_K_M.gguf

# ── Context and generation ────────────────────────────────────────────────────
# 6 GB variant: use 1024; 8 GB variant: use 2048-4096
CONTEXT_SIZE=2048

# Number of tokens to generate per response
N_PREDICT=512

# ── Threading ────────────────────────────────────────────────────────────────
# Recommended: 3 (uses big cores 1-3; leave 0 free for OS)
THREADS=3

# ── GPU offload ───────────────────────────────────────────────────────────────
# Android GPU offload is not supported by default llama.cpp on Termux.
# Set to 0 unless you have compiled with Vulkan/OpenCL support.
GPU_LAYERS=0

# ── Sampling parameters ───────────────────────────────────────────────────────
TEMP=0.7
TOP_P=0.9
TOP_K=40
REPEAT_PENALTY=1.1
MIN_P=0.05

# ── Memory mapping ───────────────────────────────────────────────────────────
# MMAP: memory-map model file (recommended — avoids copying to RAM)
MMAP=true
# MLOCK: pin model in RAM (prevents swapping; only use if RAM > 8 GB)
MLOCK=false

# ── System prompt ─────────────────────────────────────────────────────────────
SYSTEM_PROMPT="You are Aura, the AI assistant integrated into AIOS — a portable AI operating system running on a Samsung Galaxy S21 FE. You are helpful, concise, and system-aware."

# ── Server (llama-server daemon) ──────────────────────────────────────────────
SERVER_HOST=127.0.0.1
SERVER_PORT=8080
SERVER_CONTEXT_SIZE=4096
