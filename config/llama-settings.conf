# llama-settings.conf — LLaMA / llama.cpp Inference Settings
# © 2026 Chris Betts | AIOSCPU Official | AI-generated, fully legal
#
# Tune these for your hardware. Default values target Samsung Galaxy S21 FE.

# ---------------------------------------------------------------------------
# Model selection
# ---------------------------------------------------------------------------
# Directory containing .gguf model files (relative to AIOS_HOME or absolute)
LLM_MODEL_DIR="${AIOS_HOME}/llama_model"

# Preferred model file (leave empty to auto-select from LLM_MODEL_DIR)
LLM_MODEL_FILE=""

# Model selection priority by device RAM:
#   8GB  → prefer *7b*q4*.gguf  (e.g. llama-2-7b.Q4_K_M.gguf)
#   6GB  → prefer *3b*q4*.gguf  (e.g. phi-2.Q4_K_M.gguf)
#   4GB  → prefer *1b*q4*.gguf  (e.g. tinyllama-1.1b.Q4_K_M.gguf)
LLM_MODEL_8GB="*7b*q4*.gguf"
LLM_MODEL_6GB="*3b*q4*.gguf"
LLM_MODEL_4GB="*1b*q4*.gguf"

# ---------------------------------------------------------------------------
# Inference parameters
# ---------------------------------------------------------------------------
# Maximum tokens to generate per response
LLM_MAX_TOKENS=256

# Temperature (0.0 = deterministic, 1.0 = very creative)
LLM_TEMP=0.7

# Context window size (tokens); keep ≤2048 on 8GB RAM
LLM_CTX_SIZE=2048

# Number of CPU threads for inference
# Galaxy S21 FE: use 4 (big.LITTLE — bind to big Cortex-A78 cores via affinity)
LLM_THREADS=4

# CPU affinity (big Cortex-A78 cores 1-3 on Exynos 2100 / Snapdragon 888)
LLAMA_CPU_AFFINITY="1-3"

# Top-p sampling (nucleus sampling)
LLM_TOP_P=0.9

# Top-k sampling
LLM_TOP_K=40

# Repeat penalty
LLM_REPEAT_PENALTY=1.1

# ---------------------------------------------------------------------------
# Runtime binary
# ---------------------------------------------------------------------------
# llama.cpp binary name to search for (in PATH and OS_ROOT/bin)
LLM_BINARY_NAMES="llama-cli llama.cpp llama main"

# Path to compiled llama.cpp binary (set by build/build.sh)
LLM_BINARY_PATH="${AIOS_HOME}/build/llama.cpp/llama-cli"

# ---------------------------------------------------------------------------
# Prompt template
# ---------------------------------------------------------------------------
# System prompt prefix injected before user input
LLM_SYSTEM_PROMPT="You are AIOS-Lite, an intelligent AI operating system assistant. Be concise and helpful."

# Prompt format: llama2 | mistral | alpaca | raw
LLM_PROMPT_FORMAT="llama2"

# ---------------------------------------------------------------------------
# Thermal throttling (Galaxy S21 FE)
# ---------------------------------------------------------------------------
# Pause inference if CPU temperature exceeds this value (°C)
LLM_THERMAL_LIMIT_C=68

# Seconds to wait before retrying after thermal throttle
LLM_THERMAL_WAIT_S=10
