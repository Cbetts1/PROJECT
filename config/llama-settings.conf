# llama-settings.conf — llama.cpp inference tuning for AIOS
# © 2026 Chris Betts | AIOSCPU Official | AI-generated, fully legal
#
# These values are used by OS/lib/aura-llm/llm.mod when constructing the
# llama-cli command.  Override by setting environment variables before
# starting os-shell, or by sourcing this file.

# ---------------------------------------------------------------------------
# Model discovery
# ---------------------------------------------------------------------------
# Primary search directory for .gguf model files
LLAMA_MODEL_DIR="${LLAMA_MODEL_DIR:-${OS_ROOT:-/}/llama_model}"

# ---------------------------------------------------------------------------
# Inference parameters
# ---------------------------------------------------------------------------
# Maximum tokens to predict per response
LLAMA_N_PREDICT="${LLAMA_N_PREDICT:-256}"

# Sampling temperature
LLAMA_TEMP="${LLAMA_TEMP:-0.7}"

# Context length (tokens)
LLAMA_CTX_SIZE="${LLAMA_CTX_SIZE:-2048}"

# Number of parallel sequences (set to 1 for memory-constrained mobile)
LLAMA_PARALLEL="${LLAMA_PARALLEL:-1}"

# Number of threads.  On S21 FE (Snapdragon 888) use 3 big cores (A78).
LLAMA_THREADS="${LLAMA_THREADS:-3}"

# Number of layers to offload to GPU (0 = CPU-only for Adreno compatibility)
LLAMA_N_GPU_LAYERS="${LLAMA_N_GPU_LAYERS:-0}"

# Batch size for prompt evaluation
LLAMA_BATCH="${LLAMA_BATCH:-512}"

# ---------------------------------------------------------------------------
# Samsung Galaxy S21 FE — CPU affinity (Snapdragon 888 big-core cluster)
# ---------------------------------------------------------------------------
# taskset CPU range for llama inference threads.
# Cortex-A78 cores: logical indices 4-6 on stock kernel.
# Using 1-3 as conservative alternative range; adjust for your kernel.
LLAMA_CPU_AFFINITY="${LLAMA_CPU_AFFINITY:-1-3}"

# ---------------------------------------------------------------------------
# Thermal management
# ---------------------------------------------------------------------------
# Maximum temperature before inference is paused (°C, integer)
LLAMA_THERMAL_LIMIT="${LLAMA_THERMAL_LIMIT:-68}"

# Sysfs thermal sensor path (milli-Celsius on most kernels; divide by 1000)
LLAMA_THERMAL_SENSOR="${LLAMA_THERMAL_SENSOR:-/sys/class/thermal/thermal_zone0/temp}"

# ---------------------------------------------------------------------------
# Model size selection  (used by llm.mod auto-select logic)
# ---------------------------------------------------------------------------
# Leave DEVICE_RAM_VARIANT blank to auto-detect from /proc/meminfo
DEVICE_RAM_VARIANT="${DEVICE_RAM_VARIANT:-}"
LLM_MODEL_8GB="${LLM_MODEL_8GB:-llama-3-8b-instruct.Q4_K_M.gguf}"
LLM_MODEL_6GB="${LLM_MODEL_6GB:-llama-3-3b-instruct.Q4_K_M.gguf}"
