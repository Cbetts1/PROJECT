# Termux/Android Device Profile
# © 2026 Chris Betts | AIOSCPU Official
#
# Settings optimized for Termux on Android devices

DEVICE_PROFILE="termux"
DEVICE_NAME="Termux/Android"
DEVICE_VENDOR="Android"

# Termux-specific paths
PREFIX="${PREFIX:-/data/data/com.termux/files/usr}"
HOME="${HOME:-/data/data/com.termux/files/home}"
TERMUX_VERSION="${TERMUX_VERSION:-unknown}"

# Hardware specs (conservative defaults, detect if possible)
DEVICE_RAM_GB="${DEVICE_RAM_GB:-4}"
DEVICE_CPU_CORES="${DEVICE_CPU_CORES:-$(nproc 2>/dev/null || echo 4)}"

# Thermal management (aggressive for mobile)
DEVICE_THERMAL_LIMIT_C="55"
DEVICE_THERMAL_THROTTLE_C="45"

# LLaMA optimization for mobile
# Conservative to avoid thermal issues
LLAMA_CPU_AFFINITY=""
LLAMA_CTX="${LLAMA_CTX:-2048}"
LLAMA_THREADS="${LLAMA_THREADS:-2}"
LLAMA_BATCH="${LLAMA_BATCH:-256}"

# Memory limits (conservative for Android)
AIOS_MAX_MEM_MB="${AIOS_MAX_MEM_MB:-1024}"
AIOS_AI_MEM_MB="${AIOS_AI_MEM_MB:-512}"

# Storage (Termux home)
AIOS_STORAGE_PATH="${HOME}/aios"
AIOS_CACHE_PATH="${HOME}/.cache/aios"

# Android-specific
ANDROID_SDK="${ANDROID_SDK:-}"
ANDROID_DATA="/data/data/com.termux"

# Shell settings
REAL_SHELL="${PREFIX}/bin/bash"
DEFAULT_SHELL="os-shell"
