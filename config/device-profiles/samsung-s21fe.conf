# Samsung Galaxy S21 FE Device Profile
# © 2026 Chris Betts | AIOSCPU Official
#
# Optimized settings for Samsung Galaxy S21 FE (Exynos 2100 / Snapdragon 888)

DEVICE_PROFILE="samsung-s21fe"
DEVICE_NAME="Samsung Galaxy S21 FE"
DEVICE_VENDOR="Samsung"

# Hardware specs
DEVICE_RAM_GB="8"
DEVICE_CPU_CORES="8"
DEVICE_CPU_BIG_CORES="4"
DEVICE_CPU_LITTLE_CORES="4"

# Thermal management
DEVICE_THERMAL_LIMIT_C="68"
DEVICE_THERMAL_THROTTLE_C="60"

# LLaMA optimization
# Big cores (Cortex-A78 / Kryo 680) for inference
LLAMA_CPU_AFFINITY="1-3"
# Context window (reduce for lower RAM)
LLAMA_CTX="${LLAMA_CTX:-4096}"
# Thread count (match big cores)
LLAMA_THREADS="${LLAMA_THREADS:-4}"
# Batch size
LLAMA_BATCH="${LLAMA_BATCH:-512}"

# Memory limits
AIOS_MAX_MEM_MB="2048"
AIOS_AI_MEM_MB="1024"

# Storage
AIOS_STORAGE_PATH="${HOME}/aios"
AIOS_CACHE_PATH="${HOME}/.cache/aios"

# Display (for potential UI features)
DEVICE_DISPLAY_WIDTH="1080"
DEVICE_DISPLAY_HEIGHT="2340"
DEVICE_DISPLAY_DPI="401"
