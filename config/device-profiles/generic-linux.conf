# Generic Linux Device Profile
# © 2026 Chris Betts | AIOSCPU Official
#
# Sane defaults for any Linux machine (desktop, server, VM)

DEVICE_PROFILE="generic-linux"
DEVICE_NAME="Generic Linux"
DEVICE_VENDOR="Unknown"

# Hardware specs (auto-detect where possible)
DEVICE_RAM_GB="${DEVICE_RAM_GB:-$(free -g 2>/dev/null | awk '/^Mem:/{print $2}' || echo 4)}"
DEVICE_CPU_CORES="${DEVICE_CPU_CORES:-$(nproc 2>/dev/null || echo 2)}"

# Thermal management (relaxed for desktops)
DEVICE_THERMAL_LIMIT_C="85"
DEVICE_THERMAL_THROTTLE_C="75"

# LLaMA optimization
# Use half of available cores
LLAMA_CPU_AFFINITY=""
LLAMA_CTX="${LLAMA_CTX:-4096}"
LLAMA_THREADS="${LLAMA_THREADS:-$((DEVICE_CPU_CORES / 2 > 0 ? DEVICE_CPU_CORES / 2 : 1))}"
LLAMA_BATCH="${LLAMA_BATCH:-512}"

# Memory limits (generous for desktops)
AIOS_MAX_MEM_MB="${AIOS_MAX_MEM_MB:-4096}"
AIOS_AI_MEM_MB="${AIOS_AI_MEM_MB:-2048}"

# Storage
AIOS_STORAGE_PATH="${AIOS_HOME:-$HOME/aios}"
AIOS_CACHE_PATH="${XDG_CACHE_HOME:-$HOME/.cache}/aios"

# No display settings for headless
