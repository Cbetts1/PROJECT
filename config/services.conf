# AIOS Service Definitions Configuration
# © 2026 Christopher Betts | AIOSCPU Official | AI-generated, fully legal
#
# This file defines all registered AIOS services: their command, restart
# policy, priority, and dependencies. Parsed by os-service and os-kernelctl.
#
# Format:
#   [service-name]
#   cmd=<command>
#   restart=always|on-failure|never
#   priority=0-19
#   deps=<dep1,dep2,...>
#   enabled=true|false
#   log=<logfile within OS_ROOT/var/log/>

# ---------------------------------------------------------------------------
# Core kernel daemon
# ---------------------------------------------------------------------------
[kernel]
cmd=sh $OS_ROOT/etc/init.d/os-kernel start
restart=always
priority=0
deps=
enabled=true
log=os.log

# ---------------------------------------------------------------------------
# AURA AI agent daemon
# ---------------------------------------------------------------------------
[aura-agent]
cmd=python3 $AIOS_HOME/aura/aura-agent.py
restart=always
priority=5
deps=kernel
enabled=true
log=aura.log

# ---------------------------------------------------------------------------
# HTTP REST / WebSocket server
# ---------------------------------------------------------------------------
[os-httpd]
cmd=python3 $OS_ROOT/bin/os-httpd
restart=on-failure
priority=8
deps=kernel
enabled=false
log=os-httpd.log

# ---------------------------------------------------------------------------
# Health monitor
# ---------------------------------------------------------------------------
[health-monitor]
cmd=sh $OS_ROOT/bin/os-service-health daemon
restart=always
priority=10
deps=kernel
enabled=true
log=health.log

# ---------------------------------------------------------------------------
# Cross-OS bridge — iOS
# ---------------------------------------------------------------------------
[bridge-ios]
cmd=sh $OS_ROOT/lib/aura-bridge/ios.mod start
restart=on-failure
priority=8
deps=kernel
enabled=false
log=bridge.log

# ---------------------------------------------------------------------------
# Cross-OS bridge — Android
# ---------------------------------------------------------------------------
[bridge-android]
cmd=sh $OS_ROOT/lib/aura-bridge/android.mod start
restart=on-failure
priority=8
deps=kernel
enabled=false
log=bridge.log

# ---------------------------------------------------------------------------
# Cross-OS bridge — Linux/SSH
# ---------------------------------------------------------------------------
[bridge-linux]
cmd=sh $OS_ROOT/lib/aura-bridge/linux.mod start
restart=on-failure
priority=8
deps=kernel
enabled=false
log=bridge.log

# ---------------------------------------------------------------------------
# Network configuration monitor
# ---------------------------------------------------------------------------
[net-monitor]
cmd=sh $OS_ROOT/bin/os-netconf daemon
restart=on-failure
priority=10
deps=kernel
enabled=true
log=net.log

# ---------------------------------------------------------------------------
# Log rotation daemon
# ---------------------------------------------------------------------------
[log-rotate]
cmd=sh $OS_ROOT/bin/os-recover log_rotate_daemon
restart=always
priority=15
deps=kernel
enabled=true
log=os.log

# ---------------------------------------------------------------------------
# AURA task scheduler
# ---------------------------------------------------------------------------
[aura-tasks]
cmd=sh $OS_ROOT/etc/init.d/aura-tasks start
restart=on-failure
priority=10
deps=kernel,aura-agent
enabled=true
log=tasks.log
