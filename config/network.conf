# AIOS Network Configuration Template
# © 2026 Christopher Betts | AIOSCPU Official | AI-generated, fully legal
#
# Network settings for AIOS-Lite. Parsed by os-netconf and aura-net.sh.
# Copy to config/network.conf and customise for your environment.

# ---------------------------------------------------------------------------
# General network settings
# ---------------------------------------------------------------------------

# Primary network interface (auto-detect if empty)
NET_PRIMARY_IFACE=

# Preferred DNS servers (space-separated)
NET_DNS_SERVERS="8.8.8.8 8.8.4.4 1.1.1.1"

# Connection timeout for bridge operations (seconds)
NET_BRIDGE_TIMEOUT=10

# HTTP request timeout (seconds)
NET_HTTP_TIMEOUT=30

# Ping count for net.ping syscall
NET_PING_COUNT=3

# ---------------------------------------------------------------------------
# Wi-Fi settings
# ---------------------------------------------------------------------------

# Wi-Fi management backend (auto|nmcli|wpa_cli|termux|networksetup)
WIFI_BACKEND=auto

# Auto-connect to these SSIDs on boot (comma-separated)
# Leave empty to disable auto-connect
WIFI_AUTO_CONNECT=

# ---------------------------------------------------------------------------
# Bluetooth settings
# ---------------------------------------------------------------------------

# Bluetooth management backend (auto|bluetoothctl|hcitools|blueutil|termux)
BT_BACKEND=auto

# Auto-discover Bluetooth devices on boot
BT_AUTO_SCAN=false

# Bluetooth scan timeout (seconds)
BT_SCAN_TIMEOUT=15

# ---------------------------------------------------------------------------
# ADB (Android Debug Bridge) settings
# ---------------------------------------------------------------------------

# ADB server host (localhost for USB-attached devices)
ADB_HOST=localhost
ADB_PORT=5037

# ADB connection mode (usb|tcp|auto)
ADB_MODE=auto

# TCP ADB port for wireless debugging
ADB_TCP_PORT=5555

# ---------------------------------------------------------------------------
# SSH / SSHFS bridge settings
# ---------------------------------------------------------------------------

# Default SSH port
SSH_PORT=22

# SSH options for bridge connections
SSH_OPTIONS="-o StrictHostKeyChecking=ask -o ConnectTimeout=10"

# SSHFS mount options
SSHFS_OPTIONS="reconnect,ServerAliveInterval=15,ServerAliveCountMax=3"

# ---------------------------------------------------------------------------
# iOS bridge settings
# ---------------------------------------------------------------------------

# libimobiledevice tools path (auto-detect if empty)
IOS_TOOLS_PATH=

# iOS mount point within OS_ROOT
IOS_MOUNT_POINT=mirror/ios

# ifuse options
IFUSE_OPTIONS=

# ---------------------------------------------------------------------------
# HTTP REST server (os-httpd)
# ---------------------------------------------------------------------------

# See also: config/api-endpoints.conf
HTTPD_ENABLED=false
HTTPD_BIND=127.0.0.1
HTTPD_PORT=8080
HTTPD_TLS=false
HTTPD_CERT=
HTTPD_KEY=
HTTPD_TOKEN=changeme
HTTPD_CORS_ORIGINS=http://localhost:3000

# ---------------------------------------------------------------------------
# Proxy settings (for net.http syscall and AI model backend)
# ---------------------------------------------------------------------------

# HTTP proxy (empty = no proxy)
HTTP_PROXY=
HTTPS_PROXY=
NO_PROXY=localhost,127.0.0.1

# ---------------------------------------------------------------------------
# External AI model backend
# ---------------------------------------------------------------------------
# If set, AURA will send queries to this endpoint instead of local LLaMA.
# You are responsible for the privacy implications of this setting.
# Example: https://api.openai.com/v1
AI_MODEL_BACKEND=
AI_MODEL_API_KEY=

# ---------------------------------------------------------------------------
# Network monitoring
# ---------------------------------------------------------------------------

# Enable network interface monitoring daemon
NET_MONITOR_ENABLED=true

# Monitoring poll interval (seconds)
NET_MONITOR_INTERVAL=60

# Alert on interface state change
NET_ALERT_ON_CHANGE=true

# ---------------------------------------------------------------------------
# Firewall / egress policy
# ---------------------------------------------------------------------------
# AIOS does not implement a firewall. Use host OS firewall tools.
# Document intended egress here for audit purposes.
#
# Intended outbound connections:
#   localhost:5037   - ADB daemon
#   <remote>:22      - SSH bridge
#   localhost:8080   - os-httpd REST API (loopback only)
#   <AI_MODEL_BACKEND> - only if AI_MODEL_BACKEND is set
