# config/bootloader.conf
# Boot configuration for AIOS standalone mode.
# Used by deploy/usb-image-builder.sh to generate GRUB/U-Boot configs.

# ── Kernel ────────────────────────────────────────────────────────────────────
KERNEL_VERSION="5.15-aios"
KERNEL_CMDLINE="root=/dev/disk/by-label/AIOS_ROOT ro quiet loglevel=3 aios.device=s21fe"
INITRD_NAME="initrd-aios.img"

# ── Boot targets ─────────────────────────────────────────────────────────────
# Timeout in seconds before default entry is booted
GRUB_TIMEOUT=3
DEFAULT_ENTRY=0

# ── Boot entries ─────────────────────────────────────────────────────────────
ENTRY_0_LABEL="AIOS — Portable AI OS"
ENTRY_0_KERNEL="/boot/vmlinuz-aios"
ENTRY_0_INITRD="/boot/initrd-aios.img"

ENTRY_1_LABEL="AIOS Recovery Mode"
ENTRY_1_KERNEL="/boot/vmlinuz-aios"
ENTRY_1_INITRD="/boot/initrd-aios.img"
ENTRY_1_CMDLINE="root=/dev/disk/by-label/AIOS_ROOT ro single aios.recovery=1"

# ── USB boot ─────────────────────────────────────────────────────────────────
USB_IMAGE_SIZE="8G"
USB_FS_TYPE="ext4"
EFI_PARTITION_SIZE="100M"
BOOTLOADER_TYPE="grub"   # grub | uboot

# ── U-Boot (alternative bootloader for Android fastboot) ─────────────────────
UBOOT_LOAD_ADDR="0x80200000"
UBOOT_FDT_ADDR="0x84000000"
FASTBOOT_PRODUCT="s21fe-aios"
