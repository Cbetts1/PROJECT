# AIOS API Endpoints Configuration
# © 2026 Christopher Betts | AIOSCPU Official | AI-generated, fully legal
#
# Defines all HTTP REST API endpoints served by os-httpd.
# Format:
#   METHOD /path  — handler — description  — required_capability

# ---------------------------------------------------------------------------
# Server settings
# ---------------------------------------------------------------------------
HTTPD_ENABLED=false
HTTPD_BIND=127.0.0.1
HTTPD_PORT=8080
HTTPD_TLS=false
HTTPD_CERT=
HTTPD_KEY=
# Bearer token for API authentication (change before enabling)
HTTPD_TOKEN=changeme
# CORS allowed origins (comma-separated, or * for all)
HTTPD_CORS_ORIGINS=http://localhost:3000

# ---------------------------------------------------------------------------
# Authentication
# ---------------------------------------------------------------------------
# All endpoints require Authorization: Bearer <HTTPD_TOKEN>
# except for /health which is unauthenticated

# ---------------------------------------------------------------------------
# Endpoint Definitions
# ---------------------------------------------------------------------------

# Health / status (unauthenticated)
GET  /health                handler=handle_health          cap=none
#   Returns: {"status":"ok","version":"1.4.0","uptime":"..."}

# OS state
GET  /api/v1/state          handler=handle_state           cap=system.sysinfo
#   Returns: full OS state dump (proc/os.state contents)

GET  /api/v1/info           handler=handle_info            cap=system.sysinfo
#   Returns: hostname, OS_ROOT, version, runlevel, boot_time

GET  /api/v1/uptime         handler=handle_uptime          cap=system.uptime
#   Returns: {"uptime":"2h 14m","seconds":8040}

# Process management
GET  /api/v1/processes      handler=handle_ps              cap=proc.read
#   Returns: list of registered processes from var/service/*.pid

# Service management
GET  /api/v1/services       handler=handle_service_list    cap=system.service
#   Returns: list of all services and their status

GET  /api/v1/services/:name handler=handle_service_status  cap=system.service
#   Returns: status, pid, uptime for named service

POST /api/v1/services/:name/start   handler=handle_service_start   cap=system.service
POST /api/v1/services/:name/stop    handler=handle_service_stop    cap=system.service
POST /api/v1/services/:name/restart handler=handle_service_restart cap=system.service

# Resource monitoring
GET  /api/v1/resources      handler=handle_resources       cap=system.sysinfo
#   Returns: cpu, memory, disk, thermal stats

GET  /api/v1/resources/cpu  handler=handle_cpu             cap=system.sysinfo
GET  /api/v1/resources/memory handler=handle_memory        cap=system.sysinfo
GET  /api/v1/resources/disk handler=handle_disk            cap=system.sysinfo
GET  /api/v1/resources/thermal handler=handle_thermal      cap=system.sysinfo

# Logs
GET  /api/v1/logs           handler=handle_log_list        cap=log.read
#   Returns: list of available log files

GET  /api/v1/logs/:file     handler=handle_log_read        cap=log.read
#   Query params: ?tail=100&follow=false
#   Returns: last N lines of log file

POST /api/v1/logs/:file     handler=handle_log_write       cap=log.write
#   Body: {"message":"..."}

# Memory
GET  /api/v1/memory         handler=handle_mem_list        cap=memory.read
#   Returns: all symbolic memory keys

GET  /api/v1/memory/:key    handler=handle_mem_get         cap=memory.read
PUT  /api/v1/memory/:key    handler=handle_mem_set         cap=memory.write
DELETE /api/v1/memory/:key  handler=handle_mem_del         cap=memory.delete

POST /api/v1/memory/search  handler=handle_mem_search      cap=memory.read
#   Body: {"query":"..."}

POST /api/v1/memory/recall  handler=handle_recall          cap=memory.read
#   Body: {"query":"..."}  — hybrid recall

# AI
POST /api/v1/ai/ask         handler=handle_ai_ask          cap=ai.ask
#   Body: {"message":"..."}
#   Returns: {"response":"...","intent":"...","bot":"..."}

POST /api/v1/ai/classify    handler=handle_ai_classify     cap=ai.classify
#   Body: {"text":"..."}
#   Returns: {"intent":"...","confidence":0.95}

# Events
GET  /api/v1/events         handler=handle_event_list      cap=system.event
POST /api/v1/events         handler=handle_event_fire      cap=system.event
#   Body: {"name":"...","data":"..."}

# Network
GET  /api/v1/network        handler=handle_netinfo         cap=net.read
GET  /api/v1/network/interfaces handler=handle_iflist      cap=net.read
GET  /api/v1/network/routes handler=handle_routes          cap=net.read

# Bridge
GET  /api/v1/bridge         handler=handle_bridge_status   cap=system.sysinfo
POST /api/v1/bridge/detect  handler=handle_bridge_detect   cap=system.service

# Filesystem (OS_ROOT-jailed)
GET  /api/v1/fs             handler=handle_fs_ls           cap=fs.read
#   Query param: ?path=<relative path>

GET  /api/v1/fs/read        handler=handle_fs_read         cap=fs.read
#   Query param: ?path=<relative path>

POST /api/v1/fs/write       handler=handle_fs_write        cap=fs.write
#   Body: {"path":"...","data":"..."}

# WebSocket
WS   /ws/shell              handler=handle_ws_shell        cap=system.sysinfo
#   Bidirectional shell session over WebSocket

WS   /ws/log/:file          handler=handle_ws_log          cap=log.read
#   Real-time log streaming over WebSocket

WS   /ws/events             handler=handle_ws_events       cap=system.event
#   Real-time event stream over WebSocket
