# Authoritative list of all AIOS-Lite modules, their location, language,
# load order, and status. Parsed by the boot loader and os-kernelctl.
#
# Format:
#   [module-name]
#   path=<path relative to AIOS_HOME>
#   lang=sh|python|cpp
#   type=core|lib|bridge|ai|tool
#   load_order=<integer, lower = earlier>
#   enabled=true|false
#   description=<short description>

