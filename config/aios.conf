# AIOS Configuration
# © 2026 Chris Betts | AIOSCPU Official | AI-generated, fully legal
#
# Main system configuration for AIOS-Lite.
# Sourced by sbin/init, os-shell, os-real-shell, and boot services.

# ---------------------------------------------------------------------------
# Core identity
# ---------------------------------------------------------------------------
AIOS_NAME="AIOS-Lite"
AIOS_VERSION="0.2"
AIOS_VENDOR="Chris"
AIOS_DESCRIPTION="AI-Augmented Portable Operating System"

# ---------------------------------------------------------------------------
# Paths
# ---------------------------------------------------------------------------
# AIOS_HOME is the repo root (set externally or derived from sbin/init).
# OS_ROOT is the virtual filesystem root inside AIOS_HOME.
# LLAMA_MODEL_DIR is where .gguf model files are stored.
LLAMA_MODEL_DIR="${AIOS_HOME:-$(cd "$(dirname "$0")/.." 2>/dev/null && pwd)}/llama_model"
AURA_LOG_DIR="${OS_ROOT:-$AIOS_HOME/OS}/var/log"

# ---------------------------------------------------------------------------
# Target device profile
# ---------------------------------------------------------------------------
# CPU affinity for LLM inference — override to pin to big cores on your SoC.
# Leave empty for no affinity (uses all cores).  Example: "1-3" for Exynos 2100.
LLAMA_CPU_AFFINITY="${LLAMA_CPU_AFFINITY:-}"
# Available RAM in GB — used to auto-select an appropriate model size.
# Defaults to auto-detection; override if detection is unreliable.
DEVICE_RAM_GB="${DEVICE_RAM_GB:-$(awk '/MemTotal/ {printf "%d", $2/1024/1024}' /proc/meminfo 2>/dev/null || echo 4)}"
# Thermal limit in °C — reserved for future thermal-throttling support.
DEVICE_THERMAL_LIMIT_C="${DEVICE_THERMAL_LIMIT_C:-80}"
# Device profile tag — set to a descriptive string for your hardware.
DEVICE_PROFILE="${DEVICE_PROFILE:-auto}"

# ---------------------------------------------------------------------------
# Shell settings
# ---------------------------------------------------------------------------
# Default boot shell: os-shell (confined) or os-real-shell (full OS)
DEFAULT_SHELL="os-shell"
# Persona mode for os-shell: operator | system | talk
AURA_DEFAULT_MODE="operator"
# Rolling context window size (lines)
AURA_CONTEXT_WINDOW=50

# ---------------------------------------------------------------------------
# Heartbeat / health check interval (seconds)
# ---------------------------------------------------------------------------
KERNEL_HEARTBEAT_INTERVAL=5
TASK_RUN_INTERVAL_HEARTBEATS=12

# ---------------------------------------------------------------------------
# Log rotation
# ---------------------------------------------------------------------------
LOG_MAX_LINES=1000

# ---------------------------------------------------------------------------
# Feature flags
# ---------------------------------------------------------------------------
# Enable LLM inference (requires .gguf model + llama-cli binary)
ENABLE_LLM=1
# Enable cross-OS bridge (iOS/Android/Linux)
ENABLE_BRIDGE=1
# Enable agent runtime
ENABLE_AGENTS=1
# Enable AURA policy engine
ENABLE_POLICY=1
