# config/aios.conf
# Main AIOS configuration file.
# Sourced by shell scripts — use sh-compatible syntax.

# ── General ───────────────────────────────────────────────────────────────────
AIOS_VERSION="1.0.0"
AIOS_HOME="${AIOS_HOME:-$HOME/aios}"
OS_ROOT="${OS_ROOT:-$AIOS_HOME/OS}"

# ── Device ────────────────────────────────────────────────────────────────────
DEVICE_MODEL="Samsung Galaxy S21 FE"
DEVICE_ARCH="aarch64"
# RAM variant: 6 or 8 (GB). Auto-detected by installer; override here if needed.
DEVICE_RAM_GB=8

# ── CPU Affinity ──────────────────────────────────────────────────────────────
# big.LITTLE: cores 1-3 = Cortex-A78 (big), cores 4-7 = Cortex-A55 (little)
# core 0 = Cortex-X1 (prime) — avoid for sustained inference
LLAMA_CPU_AFFINITY="1-3"
SYSTEM_CPU_AFFINITY="4-7"

# ── Thermal Management ────────────────────────────────────────────────────────
THERMAL_LIMIT_C=68      # pause inference above this temperature (°C)
THERMAL_RESUME_C=60     # resume inference below this temperature (°C)
THERMAL_POLL_INTERVAL=5 # seconds between thermal checks

# ── Battery Management ────────────────────────────────────────────────────────
BATTERY_SUSPEND_PCT=15  # suspend inference below this battery %
BATTERY_RESUME_PCT=20   # resume inference above this battery %

# ── zram ──────────────────────────────────────────────────────────────────────
ZRAM_SIZE_MB=4096       # zram swap size in MB (0 to disable)

# ── Storage ───────────────────────────────────────────────────────────────────
MODEL_CACHE_DIR="$AIOS_HOME/llama_model"
OVERLAY_BASE="$OS_ROOT/overlay"
SYNC_TARGET="/sdcard/aios-backup"
# Optional rclone remote for cloud backup (e.g. "gdrive:aios-backup")
RCLONE_REMOTE=""

# ── Logging ───────────────────────────────────────────────────────────────────
LOG_DIR="$OS_ROOT/var/log"
LOG_LEVEL="info"        # debug | info | warn | error
MAX_LOG_SIZE_MB=50

# ── Boot ──────────────────────────────────────────────────────────────────────
BOOT_TARGET="multi-user"
ENABLE_OVERLAY_ON_BOOT=false  # requires root; set true to auto-mount overlays
ENABLE_INFERENCE_ON_BOOT=true # start llama daemon at boot
ENABLE_SYNC_DAEMON=true       # start sync daemon at boot
