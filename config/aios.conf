# AIOS Configuration — Samsung Galaxy S21 FE (primary target)
# © 2026 Chris Betts | AIOSCPU Official | AI-generated, fully legal
#
# Source this file to apply all AIOS runtime settings:
#   . /path/to/config/aios.conf

# ---------------------------------------------------------------------------
# OS identity
# ---------------------------------------------------------------------------
AIOS_NAME="AIOS-Lite"
AIOS_VERSION="0.1"
AIOS_VENDOR="Chris"

# ---------------------------------------------------------------------------
# Root filesystem jail
# ---------------------------------------------------------------------------
# All AIOS file I/O is confined to this path.  Must be an absolute path.
OS_ROOT="${OS_ROOT:-/}"

# ---------------------------------------------------------------------------
# LLM / AI settings  (see also config/llama-settings.conf)
# ---------------------------------------------------------------------------
# Directory containing .gguf model files (relative to OS_ROOT or absolute)
LLM_MODEL_DIR="${LLM_MODEL_DIR:-${OS_ROOT}/llama_model}"

# Maximum tokens per LLM response
LLM_MAX_TOKENS="${LLM_MAX_TOKENS:-256}"

# LLM temperature (0.0 = deterministic, 1.0 = creative)
LLM_TEMPERATURE="${LLM_TEMPERATURE:-0.7}"

# Context window size in tokens
LLM_CTX_SIZE="${LLM_CTX_SIZE:-2048}"

# ---------------------------------------------------------------------------
# Samsung Galaxy S21 FE — hardware-specific tuning
# ---------------------------------------------------------------------------
# Snapdragon 888 has 3 Cortex-A78 "big" cores at indices 4-6 (Linux 0-based),
# mapped here as taskset CPU mask 1-3 for the llama thread pool.
# Set to "" to disable CPU affinity pinning.
LLAMA_CPU_AFFINITY="${LLAMA_CPU_AFFINITY:-1-3}"

# Device RAM variant.  Set automatically from /proc/meminfo if left blank.
# Accepted values: "6GB" | "8GB" | "" (auto-detect)
DEVICE_RAM_VARIANT="${DEVICE_RAM_VARIANT:-}"

# Model to use for 8 GB variant (int4 quantised)
LLM_MODEL_8GB="${LLM_MODEL_8GB:-llama-3-8b-instruct.Q4_K_M.gguf}"

# Model to use for 6 GB variant (int4 quantised)
LLM_MODEL_6GB="${LLM_MODEL_6GB:-llama-3-3b-instruct.Q4_K_M.gguf}"

# Thermal throttle threshold in °C.  LLM inference is paused above this temp.
LLAMA_THERMAL_LIMIT="${LLAMA_THERMAL_LIMIT:-68}"

# Thermal sensor path (adjust for device; typical Snapdragon path shown)
LLAMA_THERMAL_SENSOR="${LLAMA_THERMAL_SENSOR:-/sys/class/thermal/thermal_zone0/temp}"

# ---------------------------------------------------------------------------
# Shell settings
# ---------------------------------------------------------------------------
# Default shell personality on startup (operator | system | talk)
AURA_DEFAULT_MODE="${AURA_DEFAULT_MODE:-operator}"

# Rolling context window maximum lines
AURA_CTX_MAX_LINES="${AURA_CTX_MAX_LINES:-50}"

# Audit log path (relative to OS_ROOT)
AURA_LOG_PATH="${AURA_LOG_PATH:-var/log/aura.log}"

# ---------------------------------------------------------------------------
# Heartbeat / kernel daemon
# ---------------------------------------------------------------------------
# Heartbeat interval in seconds
HB_INTERVAL="${HB_INTERVAL:-5}"

# ---------------------------------------------------------------------------
# Bridge & mirror
# ---------------------------------------------------------------------------
# Mirror root directory (relative to OS_ROOT)
MIRROR_ROOT="${MIRROR_ROOT:-mirror}"
