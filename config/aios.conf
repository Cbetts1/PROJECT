# AIOS Configuration
# © 2026 Chris Betts | AIOSCPU Official | AI-generated, fully legal
#
# Main system configuration for AIOS-Lite.
# Sourced by sbin/init, os-shell, os-real-shell, and boot services.

# ---------------------------------------------------------------------------
# Core identity
# ---------------------------------------------------------------------------
AIOS_NAME="AIOS-Lite"
AIOS_VERSION="0.1"
AIOS_VENDOR="Chris"
AIOS_DESCRIPTION="AI-Augmented Portable Operating System"

# ---------------------------------------------------------------------------
# Paths
# ---------------------------------------------------------------------------
# AIOS_HOME is the repo root (set externally or derived from sbin/init).
# OS_ROOT is the virtual filesystem root inside AIOS_HOME.
# LLAMA_MODEL_DIR is where .gguf model files are stored.
LLAMA_MODEL_DIR="${AIOS_HOME:-$(cd "$(dirname "$0")/.." 2>/dev/null && pwd)}/llama_model"
AURA_LOG_DIR="${OS_ROOT:-$AIOS_HOME/OS}/var/log"

# ---------------------------------------------------------------------------
# Target device profile
# ---------------------------------------------------------------------------
# Device auto-detection (Level 12): if DEVICE_PROFILE not set, detect it
if [ -z "${DEVICE_PROFILE:-}" ]; then
    # Try to source detect-env.sh for environment detection (requires bash)
    _DETECT_ENV="${AIOS_HOME:-$(cd "$(dirname "$0")/.." 2>/dev/null && pwd)}/tools/detect-env.sh"
    if [ -f "$_DETECT_ENV" ] && command -v bash >/dev/null 2>&1; then
        # Source with bash to handle bash-specific syntax
        AIOS_ENV=$(bash -c '. "$1" 2>/dev/null; echo "${AIOS_ENV:-linux}"' _ "$_DETECT_ENV" 2>/dev/null) || AIOS_ENV="linux"
        case "${AIOS_ENV:-linux}" in
            termux)  DEVICE_PROFILE="termux" ;;
            macos)   DEVICE_PROFILE="generic-linux" ;;
            docker)  DEVICE_PROFILE="generic-linux" ;;
            *)       DEVICE_PROFILE="generic-linux" ;;
        esac
    else
        DEVICE_PROFILE="samsung-s21fe"  # Legacy default
        AIOS_ENV="linux"
    fi
fi
export AIOS_ENV="${AIOS_ENV:-linux}"

# Load device profile if exists
_PROFILE_PATH="${AIOS_HOME:-$(cd "$(dirname "$0")/.." 2>/dev/null && pwd)}/config/device-profiles/${DEVICE_PROFILE}.conf"
if [ -f "$_PROFILE_PATH" ]; then
    . "$_PROFILE_PATH" 2>/dev/null || true
fi

# Fallback defaults if profile didn't set them
# CPU big cores (Cortex-A78) for LLM inference, little cores for background
LLAMA_CPU_AFFINITY="${LLAMA_CPU_AFFINITY:-1-3}"
# RAM variant: 8GB -> 7B int4, 6GB -> 3B int4
DEVICE_RAM_GB="${DEVICE_RAM_GB:-8}"
DEVICE_THERMAL_LIMIT_C="${DEVICE_THERMAL_LIMIT_C:-68}"

# ---------------------------------------------------------------------------
# Shell settings
# ---------------------------------------------------------------------------
# Default boot shell: os-shell (confined) or os-real-shell (full OS)
DEFAULT_SHELL="os-shell"
# Persona mode for os-shell: operator | system | talk
AURA_DEFAULT_MODE="operator"
# Rolling context window size (lines)
AURA_CONTEXT_WINDOW=50

# ---------------------------------------------------------------------------
# Heartbeat / health check interval (seconds)
# ---------------------------------------------------------------------------
KERNEL_HEARTBEAT_INTERVAL=5
TASK_RUN_INTERVAL_HEARTBEATS=12

# ---------------------------------------------------------------------------
# Log rotation
# ---------------------------------------------------------------------------
LOG_MAX_LINES=1000

# ---------------------------------------------------------------------------
# Feature flags
# ---------------------------------------------------------------------------
# Enable LLM inference (requires .gguf model + llama-cli binary)
ENABLE_LLM=1
# Enable cross-OS bridge (iOS/Android/Linux)
ENABLE_BRIDGE=1
# Enable agent runtime
ENABLE_AGENTS=1
# Enable AURA policy engine
ENABLE_POLICY=1

# ---------------------------------------------------------------------------
# Offline mode (Level 11)
# ---------------------------------------------------------------------------
# When set to 1, blocks all network operations system-wide
OFFLINE_MODE="${OFFLINE_MODE:-0}"

# ---------------------------------------------------------------------------
# Security hardening (Level 13)
# ---------------------------------------------------------------------------
# Enable security hardening features (input sanitization, audit logging)
SECURITY_HARDENED=1
