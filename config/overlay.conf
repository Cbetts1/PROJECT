# config/overlay.conf
# OverlayFS and sync configuration for AIOS mirror system.

# ── OverlayFS base directory ──────────────────────────────────────────────────
OVERLAY_BASE="${OS_ROOT:-$HOME/aios/OS}/overlay"

# ── Sync settings ─────────────────────────────────────────────────────────────
# Source: AIOS overlay upper layer (files changed within the AIOS environment)
SYNC_SOURCE="$OVERLAY_BASE/upper"

# Target: local backup on internal storage
SYNC_TARGET="/sdcard/aios-backup"

# Sync interval in seconds (used by mirror/sync-daemon.sh)
SYNC_INTERVAL=300

# Optional rclone remote for cloud backup
# Examples: "gdrive:aios-backup", "dropbox:aios", "s3:my-bucket/aios"
RCLONE_REMOTE=""

# ── Auto-mount on boot ────────────────────────────────────────────────────────
# Requires root. If false, run: bash mirror/overlay-manager.sh mount
AUTO_MOUNT=false

# ── Exclude patterns (rsync format) ───────────────────────────────────────────
SYNC_EXCLUDES="*.tmp *.log .cache proc/ sys/ dev/"
