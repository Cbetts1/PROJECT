#!/usr/bin/env bash
# etc/aios.conf — AIOS Shell Configuration
# © 2026 Chris Betts | AIOSCPU Official
#
# Sourced by lib/aura-core.sh after AIOS_ROOT is established.
# All paths default relative to AIOS_ROOT so the project is portable.
#
# ---------------------------------------------------------------------------
# TWO-CONFIG ARCHITECTURE
# ---------------------------------------------------------------------------
# AIOS uses two configuration files:
#
# 1. config/aios.conf (OS-level config)
#    - Device profile (RAM, CPU affinity, thermal limits)
#    - Hardware-specific settings
#    - Feature flags (ENABLE_LLM, ENABLE_BRIDGE, etc.)
#    - Boot configuration
#    - Sourced by: OS/sbin/init, boot services
#
# 2. etc/aios.conf (this file — shell-level config)
#    - Shell/REPL settings
#    - AI backend selection (mock vs llama)
#    - Log file paths
#    - Heartbeat settings
#    - Sourced by: lib/aura-core.sh, bin/aios
#
# For device-specific settings, edit config/aios.conf.
# For shell behavior settings, edit this file.
# ---------------------------------------------------------------------------

# Ensure AIOS_HOME is set (alias for AIOS_ROOT, used by config/aios.conf)
AIOS_HOME="${AIOS_HOME:-${AIOS_ROOT}}"
export AIOS_HOME

# Source OS-level config if available (for shared settings like LLAMA_MODEL_DIR)
_OS_CONF="${AIOS_ROOT}/config/aios.conf"
if [ -f "$_OS_CONF" ]; then
    # shellcheck source=/dev/null
    . "$_OS_CONF" 2>/dev/null || true
fi

# ---------------------------------------------------------------------------
# Shell-specific settings
# ---------------------------------------------------------------------------

# Filesystem jail root — all fs.* commands are confined to this directory.
OS_ROOT="${OS_ROOT:-${AIOS_ROOT}/OS}"

# The real OS shell launched by 'sys' or bin/aios-sys.
REAL_SHELL="${REAL_SHELL:-/bin/bash}"

# AI backend: 'mock' (always works), 'llama' (requires llama-cli + model).
AI_BACKEND="${AI_BACKEND:-mock}"

# LLaMA settings (only used when AI_BACKEND=llama).
# Note: LLAMA_MODEL_DIR is set in config/aios.conf
LLAMA_MODEL_PATH="${LLAMA_MODEL_PATH:-${LLAMA_MODEL_DIR:-${AIOS_ROOT}/llama_model}}"
LLAMA_CTX="${LLAMA_CTX:-4096}"
LLAMA_THREADS="${LLAMA_THREADS:-4}"

# Log file paths (inside the project tree so nothing leaks outside).
AIOS_LOG_FILE="${AIOS_LOG_FILE:-${AIOS_ROOT}/var/log/aios.log}"
HEARTBEAT_LOG_FILE="${HEARTBEAT_LOG_FILE:-${AIOS_ROOT}/var/log/heartbeat.log}"

# Heartbeat daemon settings.
HEARTBEAT_INTERVAL_SEC="${HEARTBEAT_INTERVAL_SEC:-${KERNEL_HEARTBEAT_INTERVAL:-5}}"
HEARTBEAT_TARGETS="${HEARTBEAT_TARGETS:-aios}"
