name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # shellcheck — lint all shell scripts
  # ---------------------------------------------------------------------------
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update -qq && sudo apt-get install -y shellcheck

      - name: Run shellcheck
        run: |
          shellcheck \
            install.sh \
            lib/aura-core.sh \
            lib/aura-fs.sh \
            lib/aura-proc.sh \
            lib/aura-net.sh \
            lib/aura-ai.sh \
            lib/aura-llama.sh \
            lib/aura-typo.sh \
            tests/unit-tests.sh \
            tests/integration-tests.sh \
            build/build.sh \
            mirror/overlay-manager.sh \
            aioscpu/build/build-image.sh \
            OS/init.d/startup.sh

  # ---------------------------------------------------------------------------
  # pytest + coverage — Python AI Core unit tests
  # ---------------------------------------------------------------------------
  pytest:
    name: pytest
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install "pytest>=7.0,<9.0" "pytest-cov>=4.0,<6.0"

      - name: Run pytest with coverage
        run: |
          pytest tests/test_python_modules.py \
            --cov=ai/core \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-py${{ matrix.python-version }}
          path: coverage.xml
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # unit-tests — shell + Python test harness
  # ---------------------------------------------------------------------------
  unit-tests:
    name: unit-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run unit tests
        run: AIOS_HOME=$(pwd) OS_ROOT=$(pwd)/OS bash tests/unit-tests.sh

  # ---------------------------------------------------------------------------
  # integration-tests — end-to-end AIOS subsystem tests
  # ---------------------------------------------------------------------------
  integration-tests:
    name: integration-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run integration tests
        run: AIOS_HOME=$(pwd) OS_ROOT=$(pwd)/OS bash tests/integration-tests.sh
