# build/grub/grub.cfg — AIOS-Lite GRUB boot menu
#
# OS_ROOT is passed on the kernel command line so the init system and AURA
# agent know where the virtual filesystem jail lives.
#
# Copy this file to /boot/grub/grub.cfg on the installed disk image, or let
# build/mkiso.sh embed it automatically.

set default=0
set timeout=5
set timeout_style=menu

# Serial console for headless / embedded deployments
#serial --speed=115200 --unit=0 --word=8 --parity=no --stop=1
#terminal_input  serial console
#terminal_output serial console

menuentry "AIOS-Lite v1.0 (Aurora) — AI Shell" {
    search --no-floppy --label --set=root aioscpu-root
    linux   /boot/vmlinuz root=LABEL=aioscpu-root rw quiet \
            aios_os_root=/opt/aios/OS \
            aios_mode=ai \
            console=tty0 console=ttyS0,115200n8
    initrd  /boot/initrd.img
}

menuentry "AIOS-Lite v1.0 (Aurora) — OS Shell" {
    search --no-floppy --label --set=root aioscpu-root
    linux   /boot/vmlinuz root=LABEL=aioscpu-root rw quiet \
            aios_os_root=/opt/aios/OS \
            aios_mode=shell \
            console=tty0 console=ttyS0,115200n8
    initrd  /boot/initrd.img
}

menuentry "AIOS-Lite — Recovery Mode" {
    search --no-floppy --label --set=root aioscpu-root
    linux   /boot/vmlinuz root=LABEL=aioscpu-root rw \
            aios_os_root=/opt/aios/OS \
            aios_mode=recovery \
            systemd.unit=rescue.target \
            console=tty0 console=ttyS0,115200n8
    initrd  /boot/initrd.img
}
