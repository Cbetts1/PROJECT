# AIOS Security Configuration
# © 2026 Chris Betts | AIOSCPU Official
#
# Security settings for AIOS-Lite

# ---------------------------------------------------------------------------
# Network Security
# ---------------------------------------------------------------------------
# Allow network operations (set to 0 to block all network calls)
ALLOW_NETWORK=1

# ---------------------------------------------------------------------------
# Execution Security
# ---------------------------------------------------------------------------
# Block execution of binaries outside OS_ROOT/AIOS_ROOT jail
# (System utilities like /bin/ls are always allowed)
ALLOW_EXEC_OUTSIDE_JAIL=0

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
# Log security-relevant events to security.log
LOG_SECURITY_EVENTS=1

# ---------------------------------------------------------------------------
# Input Validation
# ---------------------------------------------------------------------------
# Maximum input length for user commands (bytes)
MAX_INPUT_LENGTH=4096

# ---------------------------------------------------------------------------
# Path Security
# ---------------------------------------------------------------------------
# Strict path validation (reject any path traversal attempts)
STRICT_PATH_VALIDATION=1

# ---------------------------------------------------------------------------
# Session Security
# ---------------------------------------------------------------------------
# Session timeout (seconds, 0 = no timeout)
SESSION_TIMEOUT=0

# Require confirmation for destructive operations
CONFIRM_DESTRUCTIVE=1
